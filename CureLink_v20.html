      const url=`${DB_URL}/${path}.json`;
      return fetch(url,{

      // Write to 3 paths using REST API (no ESM dependency)
      this._fbREST(`${ROOT}/sos_broadcast`,"PUT",payload);
      this._fbREST(`${ROOT}/meta/sos_${patEmailKey}`,"PUT",payload);
      this._fbREST(`${ROOT}/users/${patEmailKey}/sos`,"PUT",payload);

        if(!sos)return;
        const ts=sos._ts||sos.ts||0;
        if(!ts)return;
        const key=String(ts)+"_"+(sos.patPhone||"x");
        if(seenTs.has(key))return;
        if(Date.now()-ts>120000)return;
        seenTs.add(key);
        cb({...sos,ts});
      };
      // REST polling — works without ESM (poll every 2 seconds)
      let lastTs=0;
      const DB_URL="https://curelink-703e5-default-rtdb.firebaseio.com";
      const restPoll=setInterval(()=>{
        fetch(`${DB_URL}/${ROOT}/sos_broadcast.json`)
          .then(r=>r.json())
          .then(v=>{if(v&&v._ts&&v._ts!==lastTs){lastTs=v._ts;handleSos(v);}})
          .catch(()=>{});
      },2000);
      // ESM realtime listener (faster, when available)
      let unsub1=()=>{},unsub2=()=>{};
      const connectESM=()=>{
        if(!ok())return;
        try{
          unsub1=window._fb.onValue(fbRef(`${ROOT}/sos_broadcast`),s=>{

          });

      };
      let esm=0;

      return()=>{
        clearInterval(restPoll);clearInterval(esmPoll);
        try{unsub1();}catch(e){}try{unsub2();}catch(e){}
      };
    },

/* ══════════════════════════════════════════
   📹 IN-APP VIDEO CALL FRAME (Daily.co)
   Full-screen overlay with Daily.co iframe
   ══════════════════════════════════════════ */
function VideoCallFrame({roomUrl, callerName, onEnd}){
  const[status,setStatus]=useState("connecting"); // connecting | live | ended
  const[timer,setTimer]=useState(0);
  const timerRef=useRef(null);

  useEffect(()=>{
    // Start timer once iframe loads
    const t=setTimeout(()=>{
      setStatus("live");
      timerRef.current=setInterval(()=>setTimer(s=>s+1),1000);
    },3000);
    return()=>{clearTimeout(t);clearInterval(timerRef.current);};
  },[]);

  const fmt=s=>{const m=Math.floor(s/60);const sec=s%60;return`${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;};

  const endCall=()=>{
    setStatus("ended");
    clearInterval(timerRef.current);
    setTimeout(onEnd,800);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#0a0a1a",zIndex:9000,display:"flex",flexDirection:"column",animation:"fadeIn .25s ease"}}>
      {/* Top bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"rgba(0,0,0,.6)",backdropFilter:"blur(12px)",flexShrink:0,zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#10b981,#0891b2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📹</div>
          <div>
            <div style={{color:"#fff",fontWeight:700,fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Video Consultation</div>
            <div style={{color:"#6ee7b7",fontSize:10,marginTop:1}}>{callerName}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {status==="live"&&(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(16,185,129,.15)",border:"1px solid rgba(16,185,129,.4)",borderRadius:20,padding:"4px 10px"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#10b981",animation:"pulse 1.5s infinite"}}/>
              <span style={{color:"#6ee7b7",fontSize:10,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{fmt(timer)}</span>
            </div>
          )}
          {status==="connecting"&&(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.4)",borderRadius:20,padding:"4px 10px"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#f59e0b",animation:"pulse 1s infinite"}}/>
              <span style={{color:"#fde68a",fontSize:10,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Connecting...</span>
            </div>
          )}
          <button onClick={endCall} style={{background:"linear-gradient(135deg,#e11d48,#be123c)",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6,boxShadow:"0 4px 14px rgba(225,29,72,.5)"}}>
            📵 End Call
          </button>
        </div>
      </div>

      {/* Daily.co iframe */}
      <div style={{flex:1,position:"relative"}}>
        {status==="connecting"&&(
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,zIndex:2,pointerEvents:"none"}}>
            <div style={{width:64,height:64,border:"3px solid rgba(16,185,129,.3)",borderTopColor:"#10b981",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
            <div style={{color:"#6b7280",fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Setting up secure room...</div>
          </div>
        )}
        <iframe
          src={roomUrl}
          allow="camera; microphone; fullscreen; display-capture; autoplay"
          style={{width:"100%",height:"100%",border:"none",display:"block",background:"#0a0a1a"}}
          title="CureLink Video Consultation"
        />
      </div>

      {status==="ended"&&(
        <div style={{position:"absolute",inset:0,background:"rgba(10,10,26,.9)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,zIndex:10}}>
          <div style={{fontSize:48}}>👋</div>
          <div style={{color:"#fff",fontWeight:700,fontSize:16,fontFamily:"'Playfair Display',serif"}}>Call Ended</div>
          <div style={{color:"#9ca3af",fontSize:12}}>Duration: {fmt(timer)}</div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   📹 INCOMING CALL POPUP
   ══════════════════════════════════════════ */
function IncomingCallPopup({callerName, roomName, dailyUrl, callKey, onAccept, onDecline}){
  const[elapsed,setElapsed]=useState(0);
  const audioRef=useRef(null);

  useEffect(()=>{
    // Beep sound every 2 seconds
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    const beep=()=>{
      try{
        const o=ac.createOscillator();const g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.frequency.value=880;g.gain.value=0.3;
        o.start();o.stop(ac.currentTime+0.15);
        setTimeout(()=>{
          const o2=ac.createOscillator();const g2=ac.createGain();
          o2.connect(g2);g2.connect(ac.destination);
          o2.frequency.value=1100;g2.gain.value=0.3;
          o2.start();o2.stop(ac.currentTime+0.2);
        },200);
      }catch(e){}
    };
    beep();
    const iv=setInterval(beep,2500);
    audioRef.current={ac,iv};
    return()=>{clearInterval(iv);try{ac.close();}catch(e){}};
  },[]);

  useEffect(()=>{
    const iv=setInterval(()=>setElapsed(s=>{
      if(s>=60){onDecline();return s;}
      return s+1;
    }),1000);
    return()=>clearInterval(iv);
  },[]);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",backdropFilter:"blur(8px)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .3s ease",padding:16}}>
      <div style={{background:"#fff",borderRadius:28,padding:"36px 28px",maxWidth:380,width:"100%",textAlign:"center",animation:"fadeUp .4s cubic-bezier(.22,1,.36,1)",boxShadow:"0 30px 80px rgba(0,0,0,.35)"}}>
        <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#10b981,#0891b2)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",fontSize:38,animation:"pulse 1.5s infinite",boxShadow:"0 0 40px rgba(16,185,129,.45)"}}>📹</div>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#1e1535",marginBottom:6}}>Incoming Video Call</h3>
        <p style={{color:"#6b7280",fontSize:14,marginBottom:6}}>from</p>
        <p style={{fontWeight:800,fontSize:18,color:"#059669",marginBottom:16}}>{callerName}</p>
        <div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:10,padding:"8px 12px",marginBottom:20,fontSize:11.5,color:"#065f46"}}>
          🔒 Secure Daily.co Room
          <div style={{fontSize:10,color:"#9ca3af",marginTop:3}}>Auto-dismiss in {60-elapsed}s</div>
        </div>
        <div style={{display:"flex",gap:12}}>
          <button onClick={onDecline} style={{flex:1,background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",border:"none",borderRadius:16,padding:"14px",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 18px rgba(239,68,68,.4)",transition:"all .2s"}}>
            ❌ Decline
          </button>
          <button onClick={onAccept} style={{flex:1.5,background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",border:"none",borderRadius:16,padding:"14px",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 6px 24px rgba(16,185,129,.5)",transition:"all .2s",animation:"glow 2s infinite"}}>
            ✅ Accept Call
          </button>
        </div>
      </div>
    </div>
  );
}

/* DOCTOR LOGIN — with email field + email+phone match */
function DoctorLogin({onBack,onLogin}){
  const[f,setF]=useState({drName:"",email:"",phone:"",spec:"",regId:"",hospital:"",hospitalAddress:""});const[err,setErr]=useState("");
  const go=()=>{
    setErr("");
    if(!f.drName.trim()||!f.email.trim()||!f.phone.trim()||!f.spec||!f.regId.trim())return setErr("All fields are required.");
    if(!f.hospital.trim())return setErr("Clinic / Hospital name is required.");
    if(!f.hospitalAddress.trim())return setErr("Hospital address is required.");
    if(!/\S+@\S+\.\S+/.test(f.email))return setErr("Enter a valid email.");
    if(!/^\d{10}$/.test(f.phone))return setErr("Enter a valid 10-digit phone number.");
    if(!f.regId.toUpperCase().startsWith("NMC"))return setErr("NMC Registration ID must start with 'NMC'.");
    /* Check if same NMC ID already registered — email+phone must match */
    const savedDocs=LS.get("cl_docs",[]);
    const existing=savedDocs.find(d=>d.id===f.regId.toUpperCase().trim());
    if(existing&&existing.email&&existing.phone){
      if(existing.email.toLowerCase()!==f.email.toLowerCase()||existing.phone!==f.phone){
        return setErr("This NMC ID is already registered with different email/phone. Use the same credentials.");
      }
    }
    onLogin({name:f.drName.trim(),email:f.email.trim().toLowerCase(),phone:f.phone.trim(),spec:f.spec,regId:f.regId.toUpperCase().trim(),hospital:f.hospital.trim(),hospitalAddress:f.hospitalAddress.trim()});
  };
  return(
    <div className="login-split" style={{minHeight:"100vh",background:"#f0fdf9",display:"flex",position:"relative",overflow:"hidden"}}>
      <div className="orb" style={{width:500,height:500,background:"#059669",top:-180,left:-180}}/>
      <div className="orb" style={{width:320,height:320,background:"#0891b2",bottom:-80,right:-60}}/>
      <div className="login-left" style={{width:"44%",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:44,position:"relative",zIndex:1}}>
        <div className="fu" style={{textAlign:"center"}}>
          <div style={{fontSize:64,marginBottom:16}} className="float">👨‍⚕️</div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:30,color:"#1e1535",marginBottom:10}}>Doctor Portal</h2>
          {["✅ NMC Registered Doctors Only","🔐 Email + Phone Identity Match","🗓️ Control Your Own Slots","⏳ View Waiting Lists","🔘 Toggle Availability"].map(x=>(
            <div key={x} style={{background:"#fafafa",border:"1px solid #6ee7b7",borderRadius:9,padding:"9px 13px",color:"#6b7280",fontSize:12,textAlign:"left",marginBottom:7}}>{x}</div>
          ))}
        </div>
      </div>
      <div className="login-right" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",zIndex:1}}>
        <div className="fu" style={{width:"100%",maxWidth:420,animationDelay:".06s"}}>
          <button className="btn-ghost" onClick={onBack} style={{marginBottom:20,fontSize:12,padding:"9px 15px"}}>← Back</button>
          <span className="tag tag-g" style={{marginBottom:11,display:"inline-block"}}>DOCTOR LOGIN</span>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#1e1535",marginBottom:5}}>Access Your Practice</h2>
          <p style={{color:"#9ca3af",fontSize:12,marginBottom:20}}>Same NMC ID + Email + Phone = profile restored automatically</p>
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            <div><label className="lbl">FULL DOCTOR NAME</label><input className="inp" placeholder="Dr. Full Name" value={f.drName} onChange={e=>setF({...f,drName:e.target.value})}/></div>
            <div><label className="lbl">EMAIL ADDRESS</label><input className="inp" type="email" placeholder="doctor@email.com" value={f.email} onChange={e=>setF({...f,email:e.target.value})}/></div>

/* DOCTOR SETUP */
function DoctorSetup({loginInfo,onComplete}){
  const[step,setStep]=useState(1);const[p,setP]=useState({age:"",city:"Phagwara",state:"Punjab",fees:"",quote:""});
  const[sel,setSel]=useState([]);const[err,setErr]=useState("");
  const tog=t=>setSel(s=>s.includes(t)?s.filter(x=>x!==t):sortTimes([...s,t]));
  const next=()=>{setErr("");if(!p.age||!p.city||!p.state||!p.fees)return setErr("Fill all required fields.");if(isNaN(p.fees)||+p.fees<100)return setErr("Minimum fee is ₹100.");setStep(2);};
  const finish=()=>{if(!sel.length)return setErr("Select at least one slot.");onComplete({...loginInfo,...p,fees:+p.fees,slots:sel,bk:[],apts:[],waitlist:{},on:false});};
  return(
    <div style={{minHeight:"100vh",background:"#f0fdf9",display:"flex",alignItems:"center",justifyContent:"center",padding:16,position:"relative",overflow:"hidden"}}>
      <div className="orb" style={{width:400,height:400,background:"#059669",top:-150,right:-100}}/>

            <div style={{display:"flex",gap:9}}>
              <button className="btn-ghost" onClick={()=>{setStep(1);setErr("");}}>← Back</button>
              <button className="btn-g" onClick={finish} style={{flex:1,padding:13,fontSize:13.5}}>Complete Setup →</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

/* AI CHECKER — Groq API powered (FREE) */
function AiCheck(){
  const SYSTEM_PROMPT="You are CureAI, a compassionate medical AI for CureLink India (serving Phagwara, Punjab). Assess symptoms thoroughly, explain medicines with dosage and side effects, and provide health guidance in simple English mixed with Hindi terms users may relate to. For HIGH RISK symptoms (chest pain, stroke, severe breathing, heavy bleeding, loss of consciousness), always end with: '🚨 EMERGENCY: Call 112 or go to the nearest emergency room immediately.' Use bullet points for clarity. Be empathetic, warm, and precise. Keep responses concise but complete.";
  const[msgs,setMsgs]=useState([{r:"ai",t:"Namaste! Main hoon CureAI 🤖\n\nApne symptoms describe karein ya koi bhi medicine ke baare mein poochein. Main aapki condition assess karne mein madad karunga.\n\n⚠️ Main ek AI assistant hoon — serious conditions ke liye hamesha ek qualified doctor se consult karein."}]);
  const[inp,setInp]=useState("");const[load,setLoad]=useState(false);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("cl_groq_key")||"");
  const[keyInp,setKeyInp]=useState("");const[showKeySetup,setShowKeySetup]=useState(false);
  const bot=useRef(null);
  useEffect(()=>{bot.current?.scrollIntoView({behavior:"smooth"});},[msgs,load]);
  useEffect(()=>{if(!apiKey)setShowKeySetup(true);},[apiKey]);

  const saveKey=()=>{
    const k=keyInp.trim();
    if(!k.startsWith("gsk_")){alert("Invalid key — Groq key gsk_ se shuru hoti hai");return;}
    localStorage.setItem("cl_groq_key",k);setApiKey(k);setShowKeySetup(false);setKeyInp("");
  };
  const clearKey=()=>{localStorage.removeItem("cl_groq_key");setApiKey("");setKeyInp("");setShowKeySetup(true);};

  const send=async()=>{
    if(!inp.trim()||load)return;
    if(!apiKey){setShowKeySetup(true);return;}
    const um=inp.trim();setInp("");setLoad(true);
    setMsgs(m=>[...m,{r:"user",t:um}]);
    try{
      const history=msgs.slice(1).map(m=>({role:m.r==="ai"?"assistant":"user",content:m.t}));
      const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
        body:JSON.stringify({
          model:"llama-3.3-70b-versatile",
          max_tokens:1024,
          messages:[{role:"system",content:SYSTEM_PROMPT},...history,{role:"user",content:um}]
        })
      });
      if(!res.ok){
        const e=await res.json().catch(()=>({}));
        if(res.status===401||res.status===403){setMsgs(m=>[...m,{r:"ai",t:"⚠️ Invalid API key. Tap 🔑 upar se key update karein."}]);setLoad(false);return;}
        if(res.status===429){setMsgs(m=>[...m,{r:"ai",t:"⏳ Rate limit. Thodi der baad try karein."}]);setLoad(false);return;}
        setMsgs(m=>[...m,{r:"ai",t:"⚠️ Error "+res.status+": "+(e?.error?.message||"Unknown")}]);
      }else{
        const d=await res.json();
        const txt=d?.choices?.[0]?.message?.content||"Sorry, no response. Please try again.";
        setMsgs(m=>[...m,{r:"ai",t:txt}]);
      }
    }catch(e){setMsgs(m=>[...m,{r:"ai",t:"⚠️ Network error: "+e.message}]);}
    setLoad(false);
  };

  if(showKeySetup) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"calc(100vh - 140px)",minHeight:460,padding:20}}>
      <div style={{width:"100%",maxWidth:440,background:"#fff",border:"1.5px solid #ede9fe",borderRadius:20,padding:26,boxShadow:"0 8px 32px rgba(124,58,237,.12)"}}>
        <div style={{fontSize:36,textAlign:"center",marginBottom:6}}>⚡</div>
        <div style={{textAlign:"center",marginBottom:4}}><span style={{background:"linear-gradient(135deg,#f97316,#ef4444)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:900,fontSize:13,letterSpacing:1}}>GROQ AI</span></div>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#1e1535",textAlign:"center",marginBottom:6}}>Groq API Key Daalo</h3>
        <p style={{color:"#6b7280",fontSize:12.5,textAlign:"center",marginBottom:16,lineHeight:1.6}}>Groq <strong>FREE tier</strong> hai — blazing fast! Key sirf browser mein save hoti hai.</p>
        <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:11,padding:"11px 13px",marginBottom:16,fontSize:12,color:"#9a3412",lineHeight:1.8}}>
          <strong>🔑 Key kaise milegi (2 minute):</strong><br/>
          1. <a href="https://console.groq.com/keys" target="_blank" style={{color:"#ea580c",fontWeight:700}}>console.groq.com/keys</a> kholo<br/>
          2. Google se sign up karo (free)<br/>
          3. <strong>"Create API Key"</strong> pe click karo<br/>
          4. Key copy karo (<code style={{background:"#ffedd5",padding:"1px 5px",borderRadius:4}}>gsk_...</code> se shuru hogi)<br/>
          5. Neeche paste karo ✅
        </div>
        <div style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:9,padding:"8px 12px",marginBottom:14,fontSize:11.5,color:"#92400e"}}>
          💡 <strong>Free tier:</strong> ~14,400 requests/day — koi credit card nahi!
        </div>
        <label className="lbl">GROQ API KEY</label>
        <input className="inp" type="password" placeholder="gsk_..." value={keyInp} onChange={e=>setKeyInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveKey()} style={{marginBottom:12}}/>
        <button className="btn-v" onClick={saveKey} style={{width:"100%",padding:13,fontSize:14,marginBottom:8,background:"linear-gradient(135deg,#f97316,#ef4444)"}}>Save Key & CureAI Shuru Karo →</button>
        {apiKey&&<button className="btn-ghost" onClick={()=>setShowKeySetup(false)} style={{width:"100%",padding:11,fontSize:13}}>← Wapas Chat pe Jao</button>}
      </div>
    </div>
  );

  const suggestions=["Mujhe bukhar aur sar dard hai","Saans lene mein takleef ho rahi hai","Sardi khansi ki dawai","Diabetics ke liye diet suggest karein"];
  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)",minHeight:460}}>
      <div style={{background:"linear-gradient(135deg,#ea580c,#dc2626)",borderRadius:"14px 14px 0 0",padding:"12px 16px",display:"flex",alignItems:"center",gap:11,flexShrink:0}}>
        <div style={{fontSize:24,animation:"float 3s ease-in-out infinite"}}>⚡</div>
        <div style={{flex:1}}>
          <div style={{color:"#fff",fontWeight:800,fontSize:14,fontFamily:"'Playfair Display',serif"}}>CureAI — Symptom Checker</div>
          <div style={{color:"#fed7aa",fontSize:11}}>Powered by Groq · Llama 3.3 (Free)</div>
        </div>
        <button onClick={clearKey} title="Update API Key" style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:13,color:"#fff"}}>🔑</button>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#10b981"}}/>
          <span style={{fontSize:10,color:"#10b981",fontWeight:700}}>LIVE</span>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:13,display:"flex",flexDirection:"column",gap:10,background:"#fafafa"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start"}}>
            <div className={m.r==="user"?"chat-user":"chat-ai"}>
              {m.r==="ai"&&<span style={{display:"block",fontSize:9,color:"#ea580c",fontWeight:800,marginBottom:4,letterSpacing:"1.2px"}}>CUREAI ⚡ GROQ</span>}
              {m.t}
            </div>
          </div>
        ))}
        {load&&<div style={{display:"flex"}}><div className="chat-ai" style={{display:"flex",gap:5,alignItems:"center"}}>{[0,.18,.36].map(d=><div key={d} style={{width:7,height:7,borderRadius:"50%",background:"#ea580c",animation:"pulse 1s "+d+"s infinite"}}/>)}</div></div>}
        {msgs.length===1&&!load&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
          {suggestions.map(s=><button key={s} onClick={()=>setInp(s)} style={{background:"#fff7ed",border:"1px solid #fed7aa",color:"#ea580c",borderRadius:20,padding:"6px 12px",fontSize:11.5,fontFamily:"'Plus Jakarta Sans',sans-serif",cursor:"pointer",fontWeight:600}}>{s}</button>)}
        </div>}
        <div ref={bot}/>
      </div>
      <div style={{padding:"10px 12px",background:"#fff",borderRadius:"0 0 14px 14px",borderTop:"1px solid #ede9fe",display:"flex",gap:8,flexShrink:0}}>
        <input className="inp" placeholder="Symptoms batao ya medicine ke baare mein poochho..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} style={{flex:1,fontSize:14}}/>
        <button className="btn-v" onClick={send} disabled={load} style={{padding:"10px 14px",flexShrink:0,background:"linear-gradient(135deg,#ea580c,#dc2626)"}}>{load?<Spin/>:"➤"}</button>
      </div>
    </div>
  );
}

/* SLOT FREED POPUP */
function SlotPopup({data,onBook,onDismiss}){
  const[sec,setSec]=useState(30);
  useEffect(()=>{const t=setInterval(()=>setSec(s=>{if(s<=1){onDismiss();return 0;}return s-1;}),1000);return()=>clearInterval(t);},[]);
  return(
    <div className="notif">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:13}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{width:40,height:40,borderRadius:11,background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🔔</div>
          <div><div style={{fontWeight:800,color:"#1e1535",fontSize:14}}>Slot Just Freed Up!</div><div style={{color:"#9ca3af",fontSize:11}}>You are #1 on the waitlist</div></div>
        </div>
        <button onClick={onDismiss} style={{background:"none",border:"none",color:"#9ca3af",fontSize:18,cursor:"pointer"}}>✕</button>
      </div>
      <div style={{background:"#f3f0ff",border:"1px solid #c4b5fd",borderRadius:11,padding:"11px 13px",marginBottom:13}}>
        <div style={{color:"#9ca3af",fontSize:10,fontWeight:800,marginBottom:3}}>AVAILABLE NOW</div>
        <div style={{fontWeight:700,color:"#9ca3af",fontSize:13.5}}>{data.drName}</div>
        <div style={{color:"#6b7280",fontSize:12,marginTop:3}}>🕒 {data.slot} • ₹{data.fees} • 📍 {data.city}</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn-v" onClick={onBook} style={{flex:1,padding:"10px",fontSize:13}}>Book This Slot →</button>
        <button className="btn-ghost" onClick={onDismiss} style={{fontSize:11,padding:"10px 12px"}}>Skip ({sec}s)</button>
      </div>
      <div style={{height:3,background:"#fafafa",borderRadius:3,marginTop:11,overflow:"hidden"}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,#7c3aed,#4f46e5)",width:((sec/30)*100)+"%",transition:"width 1s linear",borderRadius:3}}/>
      </div>
    </div>
  );
}

/* BOOK MODAL */
function BookModal({doc,user,onClose,onBook,onJoinWaitlist}){
  const[sel,setSel]=useState(null);const[notes,setNotes]=useState("");const[done,setDone]=useState(false);const[wlDone,setWlDone]=useState(null);const[bookErr,setBookErr]=useState("");
  const today=new Date().toLocaleDateString("en-IN");
  const todayApts=user.apts.filter(a=>a.status==="Confirmed"&&a.date===today);
  const myTodaySlots=todayApts.map(a=>a.slot);
  const alreadyThisDr=todayApts.some(a=>a.drId===doc.id);
  const joinWL=s=>{onJoinWaitlist(doc.id,s);setWlDone(s);};
  const myWlPos=s=>(doc.waitlist||{})[s]?.findIndex(w=>w.email===user.email)??-1;
  const go=()=>{
    setBookErr("");
    if(!sel)return;
    if(alreadyThisDr)return setBookErr("You already have an appointment with "+doc.name+" today.");
    if(myTodaySlots.includes(sel))return setBookErr("You already have an appointment at "+sel+" today.");
    onBook(doc,sel,notes);setDone(true);setTimeout(onClose,2600);
  };
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        {done?<div style={{textAlign:"center",padding:"28px 0"}}>
          <div style={{fontSize:54,marginBottom:12}}>✅</div>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:"#1e1535",marginBottom:6}}>Appointment Confirmed!</h3>
          <p style={{color:"#9ca3af"}}>Slot <strong style={{color:"#7c3aed"}}>{sel}</strong> with <strong style={{color:"#0e7490"}}>{doc.name}</strong></p>
          {(doc.hospital||doc.hospitalAddress||doc.city)&&(
            <div style={{marginTop:18}}>
              <div style={{fontSize:12,color:"#9ca3af",marginBottom:10}}>
                📍 {doc.hospital?<strong>{doc.hospital}</strong>:doc.name}<br/>
                <span style={{fontSize:11}}>{doc.hospitalAddress||""}{doc.hospitalAddress&&", "}{doc.city||"Phagwara"}, {doc.state||"Punjab"}</span>
              </div>
              <button onClick={()=>{const q=encodeURIComponent((doc.hospital||doc.name)+", "+(doc.hospitalAddress||"")+", "+(doc.city||"Phagwara")+", "+(doc.state||"Punjab")+", India");window.open("https://www.google.com/maps/search/?api=1&query="+q,"_blank");}} style={{background:"linear-gradient(135deg,#0ea5e9,#0284c7)",color:"#fff",border:"none",borderRadius:12,padding:"12px 22px",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 4px 14px rgba(14,165,233,.38)",display:"inline-flex",alignItems:"center",gap:8,marginTop:4}}>
                🗺️ Open in Google Maps
              </button>
            </div>
          )}
        </div>
        :<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div><h3 style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#1e1535"}}>Book Appointment</h3><p style={{color:"#9ca3af",fontSize:11,marginTop:2}}>🟢 Free = Book directly • 🔴 Booked = Join waitlist</p></div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#9ca3af",padding:4}}>✕</button>
          </div>
          <div style={{display:"flex",gap:11,padding:13,background:"#fafafa",borderRadius:12,border:"1px solid #e2e8f0",marginBottom:16}}>
            <Av name={doc.name} sz={44}/><div style={{flex:1}}><div style={{fontWeight:700,color:"#1e1535",fontSize:14}}>{doc.name}</div><span className="tag tag-v" style={{marginTop:3,display:"inline-block"}}>{doc.spec}</span><div style={{marginTop:6,color:"#7c3aed",fontWeight:800,fontSize:16}}>₹{doc.fees}</div>
            {doc.hospital&&<div style={{marginTop:7,background:"#f0f9ff",borderRadius:8,padding:"6px 10px",border:"1px solid #bae6fd"}}>
              <div style={{fontWeight:700,color:"#0369a1",fontSize:12}}>🏥 {doc.hospital}</div>
              {doc.hospitalAddress&&<div style={{color:"#9ca3af",fontSize:11,marginTop:2}}>📍 {doc.hospitalAddress}, {doc.city}</div>}
            </div>}
            </div>
          </div>
          {alreadyThisDr&&<div style={{background:"#fff1f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 13px",marginBottom:13,color:"rgba(220,38,38,.35)",fontSize:12.5}}>⚠️ You already have an appointment with this doctor today.</div>}
          <div style={{marginBottom:15}}>
            <label className="lbl">TIME SLOTS</label>
            <div className="slot-grid" style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {doc.slots.map(s=>{
                const drBooked=doc.bk.includes(s);
                const userHasSlot=myTodaySlots.includes(s);
                const pos=myWlPos(s);const wlCount=(doc.waitlist||{})[s]?.length||0;
                if(userHasSlot&&!drBooked)return <div key={s} className="slot-chip" style={{background:"#fef9c3",borderColor:"rgba(217,119,6,.5)",color:"rgba(217,119,6,.45)",cursor:"not-allowed"}}>🔒 {s}</div>;
                if(!drBooked)return <button key={s} className={"slot-chip"+(sel===s?" sel":"")} onClick={()=>{setSel(s);setBookErr("");}}>🟢 {s}</button>;
                if(pos>=0)return <div key={s} className="slot-chip mywl" title={"You're #"+(pos+1)+" on waitlist"}>⏳ {s} <span style={{fontSize:10,opacity:.65}}>#{pos+1}</span></div>;
                return <button key={s} className="slot-chip wl-join" onClick={()=>joinWL(s)}>🔴 {s}{wlCount>0&&<span style={{fontSize:10,marginLeft:3,opacity:.7}}>({wlCount})</span>}</button>;
              })}
            </div>
          </div>
          {wlDone&&<div style={{background:"#fef9c3",border:"1px solid #fcd34d",borderRadius:10,padding:"10px 13px",marginBottom:13,color:"rgba(217,119,6,.45)",fontSize:12.5}}>✅ Joined waitlist for <strong>{wlDone}</strong>! You'll get a popup when it frees up.</div>}
          {bookErr&&<div style={{background:"#fff1f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 13px",marginBottom:13,color:"rgba(220,38,38,.35)",fontSize:12.5}}>⚠️ {bookErr}</div>}
          <div style={{marginBottom:15}}><label className="lbl">NOTES FOR DOCTOR (Optional)</label><textarea className="inp" rows={3} placeholder="Briefly describe your symptoms..." value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:"none"}}/></div>
          <button className="btn-v" onClick={go} disabled={!sel||alreadyThisDr} style={{width:"100%",padding:"13px",fontSize:14,opacity:alreadyThisDr?.5:1}}>Confirm {sel?"@ "+sel:""}</button>
        </>}
      </div>
    </div>
  );
}

/* PATIENT DASHBOARD */
function PatientDash({user,setUser,docs,setDocs,onLogout}){
  const[tab,setTab]=useState("home");const[srch,setSrch]=useState("");const[fspec,setFspec]=useState("All");
  const[bookDoc,setBookDoc]=useState(null);const[profOpen,setProfOpen]=useState(false);
  const[pe,setPe]=useState({age:user.age||"",city:user.city||"",state:user.state||"",address:user.address||""});
  const[slotPopup,setSlotPopup]=useState(null);const[toast,setToast]=useState(null);
  const[incomingCall,setIncomingCall]=useState(null);
  const[patActiveCall,setPatActiveCall]=useState(null);
  const[unreadChat,setUnreadChat]=useState(0);
  const lastReadRef=useRef(LS.get("cl_last_read_"+user.email,0));
  const patKeyGlobal=useMemo(()=>user.email.toLowerCase().replace(/\./g,"_").replace(/@/g,"__at__"),[user.email]);

  // Track unread messages from doctors
  useEffect(()=>{
    const DB_URL="https://curelink-703e5-default-rtdb.firebaseio.com";
    const checkUnread=()=>{
      fetch(`${DB_URL}/curelink/users/${patKeyGlobal}/chats.json`)
        .then(r=>r.json())
        .then(allChats=>{
          if(!allChats)return;
          let count=0;
          Object.values(allChats).forEach(chat=>{
            Object.values(chat).forEach(msg=>{
              if(msg.sender==="doctor"&&(msg.ts||0)>lastReadRef.current)count++;
            });
          });
          setUnreadChat(count);
        }).catch(()=>{});
    };
    checkUnread();
    const iv=setInterval(checkUnread,4000);
    return()=>clearInterval(iv);
  },[patKeyGlobal]);

  // Clear unread when chat tab opened
  useEffect(()=>{
    if(tab==="chat"){
      const now=Date.now();
      lastReadRef.current=now;
      LS.set("cl_last_read_"+user.email,now);
      setUnreadChat(0);
    }
  },[tab]);

  // Global incoming call listener for patient
  useEffect(()=>{
    const unsub=FB.onCallsForPatient(patKeyGlobal,(call)=>{
      if(call&&call.status==="ringing"&&call.callerRole==="doctor"&&Date.now()-call.ts<65000){
        setIncomingCall(call);
      }
    });
    return typeof unsub==="function"?unsub:()=>{};
  },[patKeyGlobal]);

  useEffect(()=>{
    const sync=()=>setDocs(LS.get("cl_docs",[]));
    window.addEventListener("focus",sync);
    document.addEventListener("visibilitychange",()=>document.visibilityState==="visible"&&sync());
    return()=>window.removeEventListener("focus",sync);
  },[]);
  useEffect(()=>{
    const check=(freed,fresh)=>{
      const recent=(freed||LS.get("cl_freed_slots",[])).filter(f=>Date.now()-f.ts<15000);
      const freshDocs=fresh||LS.get("cl_docs",[]);
      for(const ev of recent){
        const d=freshDocs.find(x=>x.id===ev.drId);if(!d)continue;
        const wl=(d.waitlist||{})[ev.slot]||[];
        if(wl[0]?.email===user.email){
          setSlotPopup({drId:ev.drId,drName:d.name,slot:ev.slot,fees:d.fees,city:d.city,state:d.state});
          LS.set("cl_freed_slots",(freed||[]).filter(f=>f.ts!==ev.ts));
          if(fresh)setDocs(fresh);break;
        }
      }
    };
    check();
    const iv=setInterval(()=>check(),2000);
    const h=e=>{if(e.key==="cl_freed_slots"||e.key==="cl_docs"){setDocs(LS.get("cl_docs",[]));check();}};
    window.addEventListener("storage",h);
    // 🔥 Firebase freed slot listener
    const unsubFreed=FB.onFreed(ev=>{
      const fresh=LS.get("cl_docs",[]);
      check([ev],fresh);
    });
    return()=>{clearInterval(iv);window.removeEventListener("storage",h);unsubFreed();};
  },[user.email]);

  const myWL=docs.flatMap(doc=>Object.entries(doc.waitlist||{}).flatMap(([slot,wl])=>{
    const pos=wl.findIndex(w=>w.email===user.email);if(pos===-1)return[];
    return[{drId:doc.id,drName:doc.name,spec:doc.spec,fees:doc.fees,slot,position:pos+1,ahead:pos,total:wl.length,city:doc.city}];
  }));

  const book=(doctor,slot,notes)=>{
    const a={id:Date.now(),drId:doctor.id,drName:doctor.name,spec:doctor.spec,slot,date:new Date().toLocaleDateString("en-IN"),fees:doctor.fees,notes,status:"Confirmed",hospital:doctor.hospital||"",hospitalAddress:doctor.hospitalAddress||"",city:doctor.city||"Phagwara",state:doctor.state||"Punjab"};
    setUser(u=>({...u,apts:[...u.apts,a]}));
    setDocs(ds=>ds.map(d=>{if(d.id!==doctor.id)return d;const wl={...(d.waitlist||{})};if(wl[slot])wl[slot]=wl[slot].filter(w=>w.email!==user.email);return{...d,bk:[...d.bk,slot],waitlist:wl,apts:[...d.apts,{...a,pName:user.name,pPhone:user.phone,pEmail:user.email}]};}));
  };
  const joinWL=(drId,slot)=>{

/* DOCTOR DASHBOARD */
function DoctorDash({loginInfo,docs,setDocs,onLogout}){
  const[tab,setTab]=useState("home");const[profOpen,setProfOpen]=useState(false);const[slotEdit,setSlotEdit]=useState(false);
  const[tmpSlots,setTmpSlots]=useState([]);const[toast,setToast]=useState(null);
  const[qi]=useState(Math.floor(Math.random()*QUOTES.length));
  const[sosAlert,setSosAlert]=useState(null);
  const[incomingCall,setIncomingCall]=useState(null);
  const[drActiveCall,setDrActiveCall]=useState(null);

  // Global incoming call listener for doctor
  useEffect(()=>{
    const unsub=FB.onCallsForDoctor(loginInfo.id,(call)=>{
      if(call&&call.status==="ringing"&&call.callerRole==="patient"&&Date.now()-call.ts<65000){
        setIncomingCall(call);
      }
    });
    return typeof unsub==="function"?unsub:()=>{};
  },[loginInfo.id]);
  const doc=docs.find(d=>d.id===loginInfo.id)||loginInfo;
  const[pe,setPe]=useState({age:doc.age||"",city:"Phagwara",state:"Punjab",fees:doc.fees||"",quote:doc.quote||"",hospital:doc.hospital||"",hospitalAddress:doc.hospitalAddress||""});

    };

      if(!FB.ok)return;
      unsub=FB.onSOS(handleNewSOS);

function useFBReady(){
  const[ready,setReady]=useState(()=>!!(window._fb&&window._fb.ready));
  useEffect(()=>{
    if(window._fb&&window._fb.ready){setReady(true);return;}
    const iv=setInterval(()=>{if(window._fb&&window._fb.ready){setReady(true);clearInterval(iv);}},250);
    return()=>clearInterval(iv);
  },[]);
  return ready;
}

/* ══════════════════════════════════════════
   💬 PATIENT CHAT — Works with any doctor (appointment not required)
   ══════════════════════════════════════════ */
function PatChat({user,docs}){
  const aptDrs=useMemo(()=>[...new Map((user.apts||[]).filter(a=>a.status==="Confirmed").map(a=>[a.drId,{id:a.drId,name:a.drName,spec:a.spec,fromApt:true}])).values()],[user.apts]);
  const onlineDrs=useMemo(()=>(docs||[]).filter(d=>d.on).map(d=>({id:d.id,name:d.name,spec:d.spec,fromApt:false})),[docs]);
  const allDrs=useMemo(()=>{const aptIds=new Set(aptDrs.map(d=>d.id));return [...aptDrs,...onlineDrs.filter(d=>!aptIds.has(d.id))];},[aptDrs,onlineDrs]);

  const[selDr,setSelDr]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[inp,setInp]=useState("");
  const[search,setSearch]=useState("");
  const[recording,setRecording]=useState(false);
  const[recSec,setRecSec]=useState(0);
  const[vcModal,setVcModal]=useState(false);
  const[vcLoading,setVcLoading]=useState(false);
  const[vcError,setVcError]=useState("");
  const[activeCall,setActiveCall]=useState(null); // {url, name}
  const fbReady=useFBReady();
  const bot=useRef(null);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const patKey=useMemo(()=>user.email.toLowerCase().replace(/\./g,"_").replace(/@/g,"__at__"),[user.email]);

  useEffect(()=>{if(allDrs.length&&!selDr)setSelDr(allDrs[0]);},[allDrs]);
  useEffect(()=>{bot.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  useEffect(()=>{
    if(!selDr||!fbReady)return;
    const unsub=FB.onMsgs(patKey,selDr.id,setMsgs);
    return typeof unsub==="function"?unsub:()=>{};
  },[selDr?.id,fbReady,patKey]);

  const vcRoom=selDr?`CureLink-${selDr.id}-${patKey.slice(0,10)}`:"";

  const send=()=>{
    if(!inp.trim()||!selDr||!fbReady)return;
    FB.saveMsg(patKey,selDr.id,{id:"m"+Date.now(),sender:"patient",senderName:user.name,text:inp.trim(),type:"text",ts:Date.now()},{email:user.email,name:user.name,phone:user.phone});
    setInp("");
  };

  const startRec=async()=>{
    if(!selDr||!fbReady)return;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/ogg"});
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:mr.mimeType||"audio/webm"});
        const reader=new FileReader();
        reader.onloadend=()=>{
          const b64=reader.result;
          FB.saveMsg(patKey,selDr.id,{id:"m"+Date.now(),sender:"patient",senderName:user.name,text:"🎤 Voice message",type:"voice",audioData:b64,ts:Date.now()},{email:user.email,name:user.name,phone:user.phone});
        };
        reader.readAsDataURL(blob);
        clearInterval(timerRef.current);setRecSec(0);setRecording(false);
      };
      mr.start(200);mrRef.current=mr;setRecording(true);setRecSec(0);
      timerRef.current=setInterval(()=>setRecSec(s=>s+1),1000);
    }catch(e){alert("Microphone access denied. Please allow mic access in browser settings.");}
  };

  const stopRec=()=>{if(mrRef.current&&mrRef.current.state!=="inactive")mrRef.current.stop();};

  const filteredDrs=allDrs.filter(d=>d.name.toLowerCase().includes(search.toLowerCase())||d.spec.toLowerCase().includes(search.toLowerCase()));

  if(!allDrs.length)return(
    <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
      <div style={{fontSize:48,marginBottom:12}}>💬</div>
      <h3 style={{fontFamily:"'Playfair Display',serif",color:"#1e1535",marginBottom:8}}>No Doctors Available</h3>
      <p style={{fontSize:13,lineHeight:1.7}}>No doctors are online right now. Please check back later!</p>
    </div>
  );

  return(
    <div style={{display:"flex",gap:14,height:"calc(100vh - 180px)",minHeight:400}}>
      {/* Daily.co in-app video call frame */}
      {activeCall&&<VideoCallFrame
        roomUrl={activeCall.url}
        callerName={selDr?.name||"Doctor"}
        onEnd={()=>setActiveCall(null)}
      />}

      {/* Video call confirm modal */}
      {vcModal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&!vcLoading&&setVcModal(false)}>
        <div className="modal" style={{textAlign:"center",borderColor:"#bae6fd",maxWidth:400}}>
          <div style={{fontSize:52,marginBottom:10}}>📹</div>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#1e1535",marginBottom:7}}>Video Consultation</h3>
          <p style={{color:"#6b7280",fontSize:13,marginBottom:8,lineHeight:1.7}}>
            Aap <strong style={{color:"#0891b2"}}>{selDr?.name}</strong> ke saath HD video call shuru karne wale hain.
          </p>
          <div style={{background:"#e0f7fe",border:"1px solid #bae6fd",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#0e7490",lineHeight:1.8}}>
            🔒 <strong>Daily.co Secure Room</strong><br/>
            HD video • Encrypted • No signup needed<br/>
            Camera aur mic allow karo ✅
          </div>
          {vcError&&<div style={{background:"#fff1f2",border:"1px solid #fecdd3",borderRadius:9,padding:"9px 12px",marginBottom:12,color:"rgba(225,29,72,.8)",fontSize:12}}>⚠️ {vcError}</div>}
          <div style={{display:"flex",gap:9}}>
            <button className="btn-ghost" onClick={()=>{setVcModal(false);setVcError("");}} disabled={vcLoading} style={{flex:1}}>Cancel</button>
            <button onClick={async()=>{
              setVcLoading(true);setVcError("");
              try{
                const room=await createDailyRoom(selDr.id+"-"+patKey.slice(0,8));
                FB.saveCall(selDr.id,patKey,"patient",user.name,room.name,room.url);
                setVcModal(false);
                setActiveCall(room);
              }catch(e){setVcError("Room create nahi hua: "+e.message);}
              setVcLoading(false);
            }} disabled={vcLoading} style={{flex:2,background:"linear-gradient(135deg,#0891b2,#0e7490)",color:"#fff",border:"none",borderRadius:12,padding:"12px",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 4px 18px rgba(8,145,178,.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {vcLoading?<><div style={{width:16,height:16,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .65s linear infinite"}}/> Creating Room...</>:"📹 Start Video Call"}
            </button>
          </div>
        </div>
      </div>}

      {/* Doctor list sidebar */}
      <div style={{width:200,flexShrink:0,display:"flex",flexDirection:"column",gap:6,overflowY:"auto",borderRight:"1.5px solid #ede9fe",paddingRight:10}}>
        <input className="inp" placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{fontSize:12,padding:"8px 11px",marginBottom:4}}/>
        {filteredDrs.map(d=>(
          <button key={d.id} onClick={()=>{setSelDr(d);setMsgs([]);}} style={{border:"1.5px solid "+(selDr?.id===d.id?"#7c3aed":"#ede9fe"),background:selDr?.id===d.id?"linear-gradient(135deg,#7c3aed,#4f46e5)":"#faf5ff",color:selDr?.id===d.id?"#fff":"#1e1535",borderRadius:10,padding:"9px 10px",fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",flexDirection:"column",gap:2}}>
            <span style={{fontWeight:700,fontSize:12}}>{d.name}</span>
            <span style={{opacity:.75,fontSize:10}}>{d.spec}</span>
            {d.fromApt&&<span style={{fontSize:9,background:"rgba(255,255,255,.25)",borderRadius:4,padding:"1px 5px",marginTop:1,color:selDr?.id===d.id?"#e0e0ff":"#7c3aed",fontWeight:700}}>✅ Booked</span>}
          </button>
        ))}
        {filteredDrs.length===0&&<div style={{textAlign:"center",color:"#d1d5db",fontSize:12,padding:"20px 0"}}>No doctors found</div>}
      </div>

      {/* Chat area */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {selDr&&<div style={{background:"#f3f0ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"10px 13px",marginBottom:10,display:"flex",gap:9,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
          <Av name={selDr.name} sz={32}/>
          <div><div style={{fontWeight:700,color:"#1e1535",fontSize:13}}>{selDr.name}</div><span className="tag tag-v" style={{fontSize:10,marginTop:3,display:"inline-block"}}>{selDr.spec}</span></div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <button className="vc-btn" onClick={()=>setVcModal(true)}>📹 Video Call</button>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:fbReady?"#10b981":"#f59e0b",animation:"pulse 2s infinite"}}/>
              <span style={{fontSize:10,color:fbReady?"#10b981":"#f59e0b",fontWeight:700}}>{fbReady?"LIVE":"Connecting..."}</span>
            </div>
          </div>
        </div>}

        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,padding:"4px 0"}}>
          {!fbReady&&<div style={{textAlign:"center",padding:"20px",color:"#f59e0b",fontSize:12,fontWeight:600}}>🔄 Connecting to server...</div>}
          {fbReady&&msgs.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#d1d5db",fontSize:13}}>No messages yet. Say hello! 👋</div>}
          {msgs.map(m=>(
            <div key={m.id} style={{display:"flex",justifyContent:m.sender==="patient"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"78%",padding:"10px 14px",borderRadius:m.sender==="patient"?"16px 16px 3px 16px":"16px 16px 16px 3px",background:m.sender==="patient"?"linear-gradient(135deg,#7c3aed,#a855f7)":"#f3f0ff",color:m.sender==="patient"?"#fff":"#1e1535",border:m.sender==="patient"?"none":"1.5px solid #ede9fe",fontSize:13.5,lineHeight:1.62,boxShadow:m.sender==="patient"?"0 4px 14px rgba(124,58,237,.3)":"none"}}>
                {m.sender==="doctor"&&<span style={{display:"block",fontSize:9,color:"#7c3aed",fontWeight:800,marginBottom:4,letterSpacing:"1.2px"}}>👨‍⚕️ DOCTOR</span>}
                {m.type==="voice"?<div className="voice-bubble"><span style={{fontSize:14}}>🎤</span><audio controls src={m.audioData} style={{height:28,flex:1,minWidth:100}}/></div>:m.text}
                <div style={{fontSize:9.5,opacity:.65,marginTop:4,textAlign:m.sender==="patient"?"right":"left"}}>{new Date(m.ts).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</div>
              </div>
            </div>
          ))}
          <div ref={bot}/>
        </div>

        {/* Recording indicator */}
        {recording&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#fff1f2",border:"1px solid #fecdd3",borderRadius:9,marginBottom:6,fontSize:12,color:"#be123c",fontWeight:600}}>
          <div className="rec-wave"><span/><span/><span/><span/><span/></div>
          Recording... {recSec}s
          <span style={{fontSize:10,color:"#9ca3af",marginLeft:"auto"}}>Max 60s • Release to send</span>
        </div>}

        <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1.5px solid #ede9fe",marginTop:8,flexShrink:0,alignItems:"center"}}>
          {/* Voice record button */}
          <button
            className={"rec-btn"+(recording?" recording":" idle")}
            onMouseDown={startRec} onMouseUp={stopRec}
            onTouchStart={e=>{e.preventDefault();startRec();}} onTouchEnd={e=>{e.preventDefault();stopRec();}}
            disabled={!selDr||!fbReady}
            title={recording?"Release to send":"Hold to record voice"}
          >🎤</button>
          <input className="inp" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={fbReady?"Message your doctor...":"Connecting..."} disabled={!fbReady||recording} style={{flex:1,fontSize:14}}/>
          <button className="btn-v" onClick={send} disabled={!inp.trim()||!selDr||!fbReady||recording} style={{padding:"10px 16px",flexShrink:0}}>➤</button>
        </div>
        <div style={{textAlign:"center",fontSize:10,color:"#c4b5fd",marginTop:5}}>🎤 Hold mic button to record • 📹 Video call button to consult face-to-face</div>
      </div>
    </div>
  );
}

        </div>
      ))}

  );
}

/* ══════════════════════════════════════════
   ❤️ PATIENT HEALTH LOG
   ══════════════════════════════════════════ */
function PatHealth({user}){
  const[form,setForm]=useState({bp:"",sugar:"",weight:"",temp:"",notes:""});
  const[entries,setEntries]=useState([]);
  const[done,setDone]=useState(false);
  const fbReady=useFBReady();
  const patKey=useMemo(()=>user.email.toLowerCase().replace(/\./g,"_").replace(/@/g,"__at__"),[user.email]);
  useEffect(()=>{
    if(!fbReady)return;
    const unsub=FB.onHealth(patKey,setEntries);
    return typeof unsub==="function"?unsub:()=>{};
  },[fbReady,patKey]);

  const save=()=>{
    if(!form.bp&&!form.sugar&&!form.weight&&!form.temp)return;
    const entry={id:"h"+Date.now(),...form,ts:Date.now()};
    FB.saveHealth(patKey,entry);
    setForm({bp:"",sugar:"",weight:"",temp:"",notes:""});
    setDone(true);setTimeout(()=>setDone(false),2400);
  };
  const last=entries.length?entries[entries.length-1]:null;
  return(
    <div>
      <div className="card" style={{marginBottom:18}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#1e1535",marginBottom:14}}>📊 Log Today's Health</h3>
        {!fbReady&&<div style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:9,padding:"9px 13px",marginBottom:12,color:"#92400e",fontSize:12}}>🔄 Connecting to server...</div>}
        {done&&<div style={{background:"#f3f0ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"10px 13px",marginBottom:12,color:"#6d28d9",fontWeight:600,fontSize:13}}>✅ Saved! Your doctor can see this now.</div>}
        <div className="form-grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>

/* ══════════════════════════════════════════
   💬 DOCTOR CHAT
   ══════════════════════════════════════════ */
function DocChat({doc}){
  const basePatients=useMemo(()=>[...new Map(
    (doc.apts||[]).filter(a=>a.status==="Confirmed"&&a.pEmail)
    .map(a=>[a.pEmail,{name:a.pName,phone:a.pPhone,email:a.pEmail}])
  ).values()],[doc.apts]);
  const[extraPatients,setExtraPatients]=useState([]);
  const patients=useMemo(()=>[...new Map(
    [...basePatients,...extraPatients.filter(p=>p?.email).map(p=>({name:p.name||p.email,phone:p.phone||"",email:p.email}))]
    .map(p=>[p.email,p])
  ).values()],[basePatients,extraPatients]);

  const[selPat,setSelPat]=useState(null);
  const[msgs,setMsgs]=useState([]);
  const[inp,setInp]=useState("");
  const[recording,setRecording]=useState(false);
  const[recSec,setRecSec]=useState(0);
  const[vcModal,setVcModal]=useState(false);
  const[vcLoading,setVcLoading]=useState(false);
  const[vcError,setVcError]=useState("");
  const[activeCall,setActiveCall]=useState(null);
  const fbReady=useFBReady();
  const bot=useRef(null);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(!fbReady)return;
    const unsub=FB.onChatParticipants(doc.id,setExtraPatients);
    return typeof unsub==="function"?unsub:()=>{};
  },[doc.id,fbReady]);
  useEffect(()=>{if(patients.length&&!selPat)setSelPat(patients[0]);},[patients]);
  useEffect(()=>{bot.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const patKey=useMemo(()=>selPat?selPat.email.toLowerCase().replace(/\./g,"_").replace(/@/g,"__at__"):null,[selPat?.email]);
  const vcRoom=patKey?`CureLink-${doc.id}-${patKey.slice(0,10)}`:"";

  useEffect(()=>{
    if(!patKey||!fbReady)return;
    const unsub=FB.onMsgs(patKey,doc.id,setMsgs);
    return typeof unsub==="function"?unsub:()=>{};
  },[patKey,doc.id,fbReady]);

  const send=()=>{
    if(!inp.trim()||!patKey||!fbReady)return;
    FB.saveMsg(patKey,doc.id,{id:"m"+Date.now(),sender:"doctor",senderName:doc.name,text:inp.trim(),type:"text",ts:Date.now()},selPat);
    setInp("");
  };

  const startRec=async()=>{
    if(!patKey||!fbReady)return;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/ogg"});
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunksRef.current,{type:mr.mimeType||"audio/webm"});
        const reader=new FileReader();
        reader.onloadend=()=>{
          FB.saveMsg(patKey,doc.id,{id:"m"+Date.now(),sender:"doctor",senderName:doc.name,text:"🎤 Voice message",type:"voice",audioData:reader.result,ts:Date.now()},selPat);
        };
        reader.readAsDataURL(blob);
        clearInterval(timerRef.current);setRecSec(0);setRecording(false);
      };
      mr.start(200);mrRef.current=mr;setRecording(true);setRecSec(0);
      timerRef.current=setInterval(()=>setRecSec(s=>s+1),1000);
    }catch(e){alert("Microphone access denied. Please allow mic in browser settings.");}
  };
  const stopRec=()=>{if(mrRef.current&&mrRef.current.state!=="inactive")mrRef.current.stop();};

  if(!patients.length)return(
    <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
      <div style={{fontSize:48,marginBottom:12}}>💬</div>
      <h3 style={{fontFamily:"'Playfair Display',serif",color:"#1e1535",marginBottom:8}}>No Patient Conversations</h3>
      <p style={{fontSize:13,lineHeight:1.7}}>Patients with appointments ya jo aapko message bhejenge, yahan appear honge.</p>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)",minHeight:400}}>
      {/* Daily.co in-app video call frame */}
      {activeCall&&<VideoCallFrame
        roomUrl={activeCall.url}
        callerName={selPat?.name||"Patient"}
        onEnd={()=>setActiveCall(null)}
      />}

      {/* Video call modal */}
      {vcModal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&!vcLoading&&setVcModal(false)}>
        <div className="modal" style={{textAlign:"center",borderColor:"#a7f3d0",maxWidth:400}}>
          <div style={{fontSize:52,marginBottom:10}}>📹</div>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#1e1535",marginBottom:7}}>Start Video Consultation</h3>
          <p style={{color:"#6b7280",fontSize:13,marginBottom:8,lineHeight:1.7}}>
            <strong style={{color:"#059669"}}>{selPat?.name}</strong> ke saath HD video call shuru karein.
          </p>
          <div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#065f46",lineHeight:1.8}}>
            🔒 <strong>Daily.co Secure Room</strong><br/>
            HD video • End-to-end encrypted<br/>
            Patient ko notification milegi ✅
          </div>
          {vcError&&<div style={{background:"#fff1f2",border:"1px solid #fecdd3",borderRadius:9,padding:"9px 12px",marginBottom:12,color:"rgba(225,29,72,.8)",fontSize:12}}>⚠️ {vcError}</div>}
          <div style={{display:"flex",gap:9}}>
            <button className="btn-ghost" onClick={()=>{setVcModal(false);setVcError("");}} disabled={vcLoading} style={{flex:1}}>Cancel</button>
            <button onClick={async()=>{
              setVcLoading(true);setVcError("");
              try{
                const room=await createDailyRoom(doc.id+"-"+patKey.slice(0,8));
                FB.saveCall(doc.id,patKey,"doctor",doc.name,room.name,room.url);
                setVcModal(false);
                setActiveCall(room);
              }catch(e){setVcError("Room create nahi hua: "+e.message);}
              setVcLoading(false);
            }} disabled={vcLoading} style={{flex:2,background:"linear-gradient(135deg,#059669,#0891b2)",color:"#fff",border:"none",borderRadius:12,padding:"12px",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer",boxShadow:"0 4px 18px rgba(5,150,105,.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {vcLoading?<><div style={{width:16,height:16,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .65s linear infinite"}}/> Creating Room...</>:"📹 Start Video Call"}
            </button>
          </div>
        </div>
      </div>}

      {patients.length>1&&<div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap",overflowX:"auto",paddingBottom:4}}>
        {patients.map(p=><button key={p.email} onClick={()=>{setSelPat(p);setMsgs([]);}} style={{border:"1.5px solid "+(selPat?.email===p.email?"#059669":"#a7f3d0"),background:selPat?.email===p.email?"linear-gradient(135deg,#059669,#0891b2)":"#f0fdf4",color:selPat?.email===p.email?"#fff":"#065f46",borderRadius:9,padding:"7px 13px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>{p.name}</button>)}
      </div>}

      {selPat&&<div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 13px",marginBottom:10,display:"flex",gap:9,alignItems:"center",flexWrap:"wrap"}}>
        <Av name={selPat.name} sz={32} g={["#059669","#0891b2"]}/><div><div style={{fontWeight:700,color:"#1e1535",fontSize:13}}>{selPat.name}</div><div style={{color:"#9ca3af",fontSize:11}}>+91 {selPat.phone}</div></div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <button className="vc-btn" onClick={()=>setVcModal(true)}>📹 Video Call</button>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:fbReady?"#10b981":"#f59e0b",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:10,color:fbReady?"#10b981":"#f59e0b",fontWeight:700}}>{fbReady?"LIVE":"Connecting..."}</span>
          </div>
        </div>
      </div>}

      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,padding:"4px 0"}}>
        {!fbReady&&<div style={{textAlign:"center",padding:"20px",color:"#f59e0b",fontSize:12,fontWeight:600}}>🔄 Connecting to server...</div>}
        {fbReady&&msgs.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#d1d5db",fontSize:13}}>No messages yet. Send a message! 👋</div>}
        {msgs.map(m=>(
          <div key={m.id} style={{display:"flex",justifyContent:m.sender==="doctor"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"78%",padding:"10px 14px",borderRadius:m.sender==="doctor"?"16px 16px 3px 16px":"16px 16px 16px 3px",background:m.sender==="doctor"?"linear-gradient(135deg,#059669,#0891b2)":"#f3f0ff",color:m.sender==="doctor"?"#fff":"#1e1535",border:m.sender==="doctor"?"none":"1.5px solid #ede9fe",fontSize:13.5,lineHeight:1.62,boxShadow:m.sender==="doctor"?"0 4px 14px rgba(5,150,105,.3)":"none"}}>
              {m.sender==="patient"&&<span style={{display:"block",fontSize:9,color:"#7c3aed",fontWeight:800,marginBottom:4,letterSpacing:"1.2px"}}>🧑 PATIENT</span>}
              {m.type==="voice"?<div className="voice-bubble"><span style={{fontSize:14}}>🎤</span><audio controls src={m.audioData} style={{height:28,flex:1,minWidth:100}}/></div>:m.text}
              <div style={{fontSize:9.5,opacity:.65,marginTop:4,textAlign:m.sender==="doctor"?"right":"left"}}>{new Date(m.ts).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</div>
            </div>
          </div>
        ))}
        <div ref={bot}/>
      </div>

      {recording&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#fff1f2",border:"1px solid #fecdd3",borderRadius:9,marginBottom:6,fontSize:12,color:"#be123c",fontWeight:600}}>
        <div className="rec-wave"><span/><span/><span/><span/><span/></div>
        Recording... {recSec}s
        <span style={{fontSize:10,color:"#9ca3af",marginLeft:"auto"}}>Release to send</span>
      </div>}

      <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1.5px solid #a7f3d0",marginTop:8,alignItems:"center"}}>
        <button
          className={"rec-btn"+(recording?" recording":" idle")}
          onMouseDown={startRec} onMouseUp={stopRec}
          onTouchStart={e=>{e.preventDefault();startRec();}} onTouchEnd={e=>{e.preventDefault();stopRec();}}
          disabled={!patKey||!fbReady}
          title={recording?"Release to send":"Hold to record voice"}
          style={{borderColor:"#a7f3d0",color:"#059669",background:"#f0fdf4"}}
        >🎤</button>
        <input className="inp" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={fbReady?"Message to patient...":"Connecting..."} disabled={!fbReady||recording} style={{flex:1,fontSize:14}}/>
        <button className="btn-g" onClick={send} disabled={!inp.trim()||!patKey||!fbReady||recording} style={{padding:"10px 16px",flexShrink:0}}>➤</button>
      </div>
      <div style={{textAlign:"center",fontSize:10,color:"#6ee7b7",marginTop:5}}>🎤 Hold mic to record voice • 📹 Video Call button for consultation</div>
    </div>
  );
}

/* ══════════════════════════════════════════

function DocRx({doc}){
  const basePatients=useMemo(()=>[...new Map(
    (doc.apts||[]).filter(a=>a.status==="Confirmed"&&a.pEmail)
    .map(a=>[a.pEmail,{name:a.pName,phone:a.pPhone,email:a.pEmail}])
  ).values()],[doc.apts]);
  const[extraPatients,setExtraPatients]=useState([]);
  const patients=useMemo(()=>[...new Map(
    [...basePatients,...extraPatients.filter(p=>p?.email).map(p=>({name:p.name||p.email,phone:p.phone||"",email:p.email}))]
    .map(p=>[p.email,p])
  ).values()],[basePatients,extraPatients]);

  const[selPat,setSelPat]=useState(null);
  const[form,setForm]=useState({medicine:"",dosage:"",duration:"",notes:""});
  const[rxs,setRxs]=useState([]);
  const[done,setDone]=useState(false);
  const fbReady=useFBReady();

  useEffect(()=>{
    if(!fbReady)return;
    const unsub=FB.onChatParticipants(doc.id,setExtraPatients);
    return typeof unsub==="function"?unsub:()=>{};
  },[doc.id,fbReady]);
  useEffect(()=>{if(patients.length&&!selPat)setSelPat(patients[0]);},[patients]);

  const patKey=useMemo(()=>selPat?selPat.email.toLowerCase().replace(/\./g,"_").replace(/@/g,"__at__"):null,[selPat?.email]);

  useEffect(()=>{
    if(!patKey||!fbReady)return;
    const unsub=FB.onRxs(patKey,setRxs);
    return typeof unsub==="function"?unsub:()=>{};
  },[patKey,fbReady]);

  const send=()=>{
    if(!form.medicine.trim()||!form.dosage.trim()||!form.duration.trim()||!patKey)return;
    const rx={id:"rx"+Date.now(),medicine:form.medicine.trim(),dosage:form.dosage.trim(),duration:form.duration.trim(),notes:form.notes.trim(),drName:doc.name,drId:doc.id,ts:Date.now()};
    FB.saveChatParticipant(doc.id,selPat);
    FB.saveRx(patKey,rx);
    setForm({medicine:"",dosage:"",duration:"",notes:""});
    setDone(true);setTimeout(()=>setDone(false),2500);
  };

  if(!patients.length)return(
    <div style={{textAlign:"center",padding:"60px 20px",color:"#9ca3af"}}>
      <div style={{fontSize:48,marginBottom:12}}>💊</div>
      <h3 style={{fontFamily:"'Playfair Display',serif",color:"#1e1535",marginBottom:8}}>No Patients Yet</h3>
      <p style={{fontSize:13,lineHeight:1.7}}>Patients with appointments ya active chats yahan dikhेंगे.</p>
    </div>
  );

    <div>
      {patients.length>1&&<div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        {patients.map(p=><button key={p.email} onClick={()=>{setSelPat(p);setRxs([]);}} style={{border:"1.5px solid "+(selPat?.email===p.email?"#059669":"#a7f3d0"),background:selPat?.email===p.email?"linear-gradient(135deg,#059669,#0891b2)":"#f0fdf4",color:selPat?.email===p.email?"#fff":"#065f46",borderRadius:9,padding:"7px 13px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{p.name}</button>)}
      </div>}
      {selPat&&<div className="card" style={{marginBottom:18}}>
        <div style={{height:3,background:"linear-gradient(90deg,#059669,#06b6d4)",borderRadius:3,marginBottom:14,marginTop:-18,marginLeft:-18,marginRight:-18,width:"calc(100% + 36px)"}}/>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#1e1535",marginBottom:4}}>Write Prescription</h3>
        <p style={{color:"#9ca3af",fontSize:12,marginBottom:14}}>For: <strong style={{color:"#059669"}}>{selPat.name}</strong> (+91 {selPat.phone})</p>
        {!fbReady&&<div style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:9,padding:"9px 13px",marginBottom:12,color:"#92400e",fontSize:12}}>🔄 Connecting to server...</div>}
        {done&&<div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 13px",marginBottom:12,color:"#059669",fontWeight:600,fontSize:13}}>✅ Prescription sent to patient!</div>}
        <div className="form-grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
          <div style={{gridColumn:"1/-1"}}><label className="lbl">MEDICINE NAME *</label><input className="inp" placeholder="e.g. Paracetamol 500mg" value={form.medicine} onChange={e=>setForm({...form,medicine:e.target.value})}/></div>
          <div><label className="lbl">DOSAGE *</label><input className="inp" placeholder="e.g. 1 tab 3x/day" value={form.dosage} onChange={e=>setForm({...form,dosage:e.target.value})}/></div>
          <div><label className="lbl">DURATION *</label><input className="inp" placeholder="e.g. 5 days" value={form.duration} onChange={e=>setForm({...form,duration:e.target.value})}/></div>
          <div style={{gridColumn:"1/-1"}}><label className="lbl">SPECIAL INSTRUCTIONS</label><textarea className="inp" rows={2} placeholder="Take after food, avoid if pregnant..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={{resize:"none"}}/></div>
        </div>
        <button className="btn-g" onClick={send} disabled={!fbReady||!form.medicine.trim()||!form.dosage.trim()||!form.duration.trim()} style={{width:"100%",padding:12,marginTop:12,fontSize:13.5}}>Send Prescription to Patient 💊</button>
      </div>}
      {rxs.filter(r=>r.drId===doc.id).length>0&&<>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#1e1535",marginBottom:10}}>Prescriptions Sent</h3>
        {[...rxs].reverse().filter(r=>r.drId===doc.id).map(rx=>(
          <div key={rx.id} className="row">
            <div><div style={{fontWeight:700,color:"#1e1535",fontSize:13}}>💊 {rx.medicine}</div><div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>{rx.dosage} · {rx.duration} · {new Date(rx.ts).toLocaleDateString("en-IN")}</div>{rx.notes&&<div style={{fontSize:11,color:"#d1d5db",marginTop:1,fontStyle:"italic"}}>{rx.notes}</div>}</div>
            <span className="tag tag-g" style={{fontSize:10}}>Sent ✓</span>
          </div>
        ))}
      </>}
    </div>
  );
}

/* ══════════════════════════════════════════

function SOSButton({user}){
  const[step,setStep]=useState("idle"); // idle | locating | confirm | sending | sent | error
  const[loc,setLoc]=useState(null);
  const[errMsg,setErrMsg]=useState("");
  const patKey=user.email.toLowerCase().replace(/\./g,"_").replace(/@/g,"__at__");

  const triggerSOS=()=>{
    if(step==="sending"||step==="sent")return;
    setStep("locating");setErrMsg("");
    if(!navigator.geolocation){setLoc(null);setStep("confirm");return;}
    navigator.geolocation.getCurrentPosition(
      pos=>{
        setLoc({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)});
        setStep("confirm");
      },
      err=>{
        // Location denied — still send SOS without location
        setLoc(null);setStep("confirm");
      },
      {timeout:8000,maximumAge:0}
    );
  };

  const confirmSend=()=>{
    setStep("sending");
    const mapsLink=loc?`https://www.google.com/maps?q=${loc.lat},${loc.lng}`:"Location unavailable";
    const ts=Date.now();
    const sos={
      patName:user.name,
      patPhone:user.phone,
      patEmail:user.email,
      patAddress:user.address||"",
      lat:loc?.lat||null,
      lng:loc?.lng||null,
      mapsLink,
      accuracy:loc?.accuracy||null,
      message:`🚨 EMERGENCY SOS from ${user.name} (${user.phone}). ${loc?`Location: ${mapsLink}`:"Location unavailable. Please call immediately!"}`,
      ts,
      _ts:ts
    };
    // Save to localStorage backup
    LS.set("cl_sos_latest",sos);
    // Use FB.saveSOS which uses REST API — works without ESM
    FB.saveSOS(patKey,sos);
    setTimeout(()=>setStep("sent"),1200);
    setTimeout(()=>setStep("idle"),9000);
  };

  if(step==="confirm")return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&setStep("idle")}>
      <div className="modal" style={{textAlign:"center",borderColor:"#fecdd3"}}>
        <div style={{fontSize:52,marginBottom:12,animation:"pulse 1s infinite"}}>🚨</div>

        <p style={{color:"#9ca3af",fontSize:13,marginBottom:8,lineHeight:1.7}}>This will alert <strong>ALL available doctors</strong> with your name, phone, and location.</p>
        {loc?<div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 13px",marginBottom:16,fontSize:12.5}}>
          📍 Location captured (±{loc.accuracy}m accuracy)<br/>
          <a href={`https://www.google.com/maps?q=${loc.lat},${loc.lng}`} target="_blank" style={{color:"#059669",fontWeight:700}}>Preview on Maps →</a>
        </div>:<div style={{background:"#fff1f2",border:"1px solid #fecdd3",borderRadius:10,padding:"10px 13px",marginBottom:16,color:"rgba(225,29,72,.7)",fontSize:12}}>⚠️ Location unavailable — SOS will still be sent with your address.</div>}
        {user.address&&<div style={{background:"#f3f0ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"9px 12px",marginBottom:16,fontSize:12,color:"#6d28d9"}}>🏠 Address: {user.address}</div>}
        <div style={{display:"flex",gap:9}}>
          <button className="btn-ghost" onClick={()=>setStep("idle")} style={{flex:1}}>Cancel</button>
          <button onClick={confirmSend} style={{flex:2,padding:"13px",border:"none",borderRadius:12,background:"linear-gradient(135deg,#e11d48,#be123c)",color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 18px rgba(225,29,72,.45)"}}>🚨 Send SOS Now</button>
        </div>
      </div>
    </div>
  );

  if(step==="sending")return(
    <div className="overlay">
      <div className="modal" style={{textAlign:"center",borderColor:"#fecdd3"}}>
        <div style={{fontSize:52,marginBottom:12,animation:"spin 1s linear infinite"}}>⏳</div>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#e11d48",marginBottom:8}}>Sending SOS...</h3>
        <p style={{color:"#9ca3af",fontSize:13}}>Please wait while we alert all doctors.</p>
      </div>
    </div>
  );

  if(step==="sent")return(
    <div className="overlay">
      <div className="modal" style={{textAlign:"center",borderColor:"#a7f3d0"}}>
        <div style={{fontSize:52,marginBottom:12}}>✅</div>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#059669",marginBottom:8}}>SOS Sent!</h3>
        <p style={{color:"#9ca3af",fontSize:13,lineHeight:1.7}}>Emergency alert sent to all available doctors. Stay calm — help is on the way! 🏥</p>
        <div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:10,padding:"10px 13px",marginTop:12,fontSize:12,color:"#065f46"}}>
          <strong>While you wait:</strong><br/>Call 112 for ambulance or ask someone nearby for help.
        </div>
        <button className="btn-g" onClick={()=>setStep("idle")} style={{marginTop:16,width:"100%",padding:12}}>Close</button>

        {step==="locating"?"⏳":"🆘"}
      </button>
    </div>
  );
}

/* ROOT APP */
function App(){
  const[docs,setDocsRaw]=useState(()=>LS.get("cl_docs",[]));
  /* 🔥 Firebase real-time sync — waits for ESM module to load */
  useEffect(()=>{
    let unsub=null;
    const mergeDocs=fbDocs=>{
      const merged=DUMMY_DOCS.map(dd=>{const ex=fbDocs.find(f=>f.id===dd.id);return ex?ex:dd;});
      const realDrs=fbDocs.filter(f=>!DUMMY_DOCS.find(dd=>dd.id===f.id));
      return[...merged,...realDrs];
    };
    const connect=()=>{
      if(!FB.ok)return;
      FB.loadDocs().then(fbDocs=>{
        if(fbDocs&&fbDocs.length>0){
          const all=mergeDocs(fbDocs);
          LS.set("cl_docs",all);setDocsRaw(all);
        }else{
          const local=LS.get("cl_docs",[]);
          if(local.length>0)FB.saveDocs(local);
        }
      });
      unsub=FB.onDocs(fbDocs=>{
        const all=mergeDocs(fbDocs);
        LS.set("cl_docs",all);setDocsRaw(all);
      });
    };
    // ESM module loads async — poll until ready (max 5s)
    let attempts=0;
    const poll=setInterval(()=>{
      attempts++;
      if(FB.ok){clearInterval(poll);connect();}
      else if(attempts>50){clearInterval(poll);console.warn("Firebase unavailable — using localStorage");}
    },100);
    return()=>{clearInterval(poll);if(unsub)unsub();};
  },[]);
  const setDocs=upd=>{setDocsRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;LS.set("cl_docs",next);FB.saveDocs(next);return next;});};
  const[screen,setScreen]=useState("landing");
  const[curUser,setCurUserRaw]=useState(null);
  const setUser=upd=>{setCurUserRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;if(next){LS.set("cl_cur_user",next);const all=LS.get("cl_all_users",{});all[next.email.toLowerCase()]=next;LS.set("cl_all_users",all);FB.saveUser(next);}return next;});};
  const[curDrId,setCurDrId]=useState(null);const[tempDr,setTempDr]=useState(null);
  const curDoc=docs.find(d=>d.id===curDrId)||null;
  const[toast,setToast]=useState(null);

  const handleUserLogin=f=>{
    const all=LS.get("cl_all_users",{});const key=f.email.toLowerCase();
    if(all[key]&&all[key].phone===f.phone){
      const saved=all[key];setCurUserRaw(saved);LS.set("cl_cur_user",saved);
      setToast({msg:"Welcome back, "+saved.name.split(" ")[0]+"! Account restored.",type:"ok"});
    }else{
      const nu={...f,age:"",city:"",state:"",address:f.address||"",apts:[]};
      all[key]=nu;LS.set("cl_all_users",all);LS.set("cl_cur_user",nu);setCurUserRaw(nu);
      setToast({msg:"Welcome to CureLink, "+nu.name.split(" ")[0]+"! 🎉",type:"new"});
    }
    setScreen("userDash");
  };

  const handleDrLogin=info=>{
    const existing=docs.find(d=>d.id===info.regId);
    if(existing){
      /* Save email+phone+hospital to the doctor record if not already set */
      if(!existing.email||!existing.phone||!existing.hospital){
        setDocs(ds=>ds.map(d=>d.id===info.regId?{...d,email:info.email,phone:info.phone,hospital:info.hospital||d.hospital||"",hospitalAddress:info.hospitalAddress||d.hospitalAddress||""}:d));
      }
      setCurDrId(existing.id);
      setToast({msg:"Welcome back, "+existing.name+"! 👨‍⚕️",type:"ok"});
      setScreen("doctorDash");
    }else{
      setTempDr(info);setScreen("doctorSetup");
    }
  };

  const handleSetupComplete=fullDoc=>{
    const doc={...fullDoc,id:tempDr.regId,email:tempDr.email,phone:tempDr.phone,hospital:tempDr.hospital||"",hospitalAddress:tempDr.hospitalAddress||""};
    setDocs(ds=>[...ds,doc]);setCurDrId(doc.id);
    setToast({msg:"Welcome to CureLink, "+doc.name+"! 🎉",type:"new"});
    setScreen("doctorDash");
  };
  const logoutUser=()=>{setCurUserRaw(null);setScreen("landing");};
  const logoutDoctor=()=>{setCurDrId(null);setScreen("landing");};

  return(
    <div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {screen==="landing"&&<Landing onChoice={c=>setScreen(c==="user"?"userLogin":"doctorLogin")}/>}
      {screen==="userLogin"&&<PatientLogin onBack={()=>setScreen("landing")} onLogin={handleUserLogin}/>}
      {screen==="doctorLogin"&&<DoctorLogin onBack={()=>setScreen("landing")} onLogin={handleDrLogin}/>}
      {screen==="doctorSetup"&&tempDr&&<DoctorSetup loginInfo={tempDr} onComplete={handleSetupComplete}/>}
      {screen==="userDash"&&curUser&&<PatientDash user={curUser} setUser={setUser} docs={docs} setDocs={setDocs} onLogout={logoutUser}/>}
      {screen==="doctorDash"&&curDoc&&<DoctorDash loginInfo={curDoc} docs={docs} setDocs={setDocs} onLogout={logoutDoctor}/>}
      {screen==="userDash"&&!curUser&&<Landing onChoice={c=>setScreen(c==="user"?"userLogin":"doctorLogin")}/>}
      {screen==="doctorDash"&&!curDoc&&<Landing onChoice={c=>setScreen(c==="user"?"userLogin":"doctorLogin")}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
